name: CI + Staging

# Pipeline (this file):
#   push to main → check → deploy STAGING (auto) → core test vs staging
#
# Production is DELIBERATELY not here. Promotion to prod is a separate,
# manually-triggered workflow: .github/workflows/deploy-production.yml
# (Actions tab → "Deploy production" → Run workflow). That's your promote
# button. Each deploy migrates its own D1 first, so schema never drifts
# behind the code.
#
# Repo secrets required (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   (Workers Scripts: Edit + D1: Edit)
#   CLOUDFLARE_ACCOUNT_ID
#   TEST_USER_EMAIL / TEST_USER_PASSWORD  (core-test login)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-staging:
    needs: check
    runs-on: ubuntu-latest
    environment: staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migrate staging D1
        run: pnpm exec wrangler d1 migrations apply boat-sitter-db-staging --remote --env staging
      - name: Build (staging env)
        run: pnpm build
        env:
          CLOUDFLARE_ENV: staging
      - name: Deploy staging worker
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_ENV: staging
      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium
      - name: Core test (staging)
        run: pnpm test:core
        env:
          CORE_BASE_URL: https://boatstead-staging.sharukrules.workers.dev
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
